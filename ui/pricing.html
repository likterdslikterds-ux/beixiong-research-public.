<!doctype html><html lang="zh-CN"><meta charset="UTF-8"><meta name="viewport"content="width=device-width,initial-scale=1"><title>Ozon 定价工具</title><style>:root{--panel:rgba(255, 255, 255, 0.95);--line:rgba(133, 154, 186, 0.28);--text:#17324d;--muted:#63778f;--brand:#2563eb;--shadow:0 24px 60px rgba(18, 40, 76, 0.12);--radius:24px}*{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--text);font:14px/1.55 "Segoe UI","PingFang SC",sans-serif;background:radial-gradient(circle at top left,rgba(37,99,235,.18),transparent 30%),radial-gradient(circle at 100% 0,rgba(16,185,129,.12),transparent 24%),linear-gradient(180deg,#f7fbff,#edf4ff)}.page{max-width:1380px;margin:0 auto;padding:32px 24px 40px}.hero{display:flex;justify-content:space-between;gap:20px;align-items:flex-end;margin-bottom:24px}.hero h1{margin:0 0 8px;font-size:34px;line-height:1.1;letter-spacing:-.03em}.hero p{margin:0;max-width:760px;color:var(--muted);font-size:15px}button,input,select{font:inherit}button{border:0;border-radius:14px;cursor:pointer;transition:transform .18s ease,box-shadow .18s ease}button:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 12px 28px rgba(37,99,235,.14)}.ghost-btn{padding:12px 18px;color:var(--brand);background:rgba(255,255,255,.78);border:1px solid rgba(37,99,235,.22);font-weight:700}.layout{display:grid;grid-template-columns:minmax(380px,1.04fr) minmax(400px,0.96fr);gap:22px}.panel{background:var(--panel);border:1px solid rgba(255,255,255,.75);border-radius:var(--radius);box-shadow:var(--shadow);backdrop-filter:blur(10px)}.left-panel,.result-panel{padding:24px}.result-panel{display:grid;gap:18px}.section+.section{margin-top:22px}.section-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}.section-header h2{margin:0;font-size:18px}.section-header span{color:var(--muted);font-size:13px}.section-dot{width:10px;height:10px;border-radius:999px;background:linear-gradient(135deg,#2563eb,#0ea5e9);box-shadow:0 0 0 6px rgba(37,99,235,.1)}.grid{display:grid;gap:14px}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}.field{display:grid;align-content:start;gap:7px}.field label{font-size:13px;color:var(--muted);font-weight:700}.field input,.field select{width:100%;border-radius:14px;border:1px solid var(--line);padding:13px 14px;color:var(--text);background:linear-gradient(180deg,#fff,#f9fbff);outline:0}.commission-cascader{position:relative;min-width:0}.commission-cascader-control{position:relative}.commission-cascader-input{width:100%;padding-right:34px}.commission-cascader-clear{position:absolute;top:50%;right:10px;width:18px;height:18px;padding:0;border:0;border-radius:50%;background:#bfbfbf;color:#fff;font-size:13px;line-height:18px;cursor:pointer;transform:translateY(-50%)}.commission-cascader-clear:hover{background:#8c8c8c}.commission-cascader-dropdown{position:absolute;top:calc(100% + 6px);left:0;z-index:1000;display:flex;min-width:0;max-width:calc(100vw - 48px);height:210px;overflow:hidden;overscroll-behavior:contain;border-radius:8px;border:1px solid rgba(5,5,5,.06);background:#fff;box-shadow:0 6px 16px 0 rgba(0,0,0,.08),0 3px 6px -4px rgba(0,0,0,.12),0 9px 28px 8px rgba(0,0,0,.05)}.commission-cascader-dropdown[hidden]{display:none}.commission-cascader-menu{width:240px;min-width:0;height:100%;padding:4px;overflow-y:auto;overscroll-behavior:contain;border-right:1px solid rgba(5,5,5,.06);scrollbar-width:thin}.commission-cascader-menu:last-child{border-right:0}.commission-cascader-item{display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;min-height:32px;padding:5px 8px;border:0;border-radius:4px;background:0 0;color:rgba(0,0,0,.88);font-size:14px;line-height:1.55;text-align:left;cursor:pointer}.commission-cascader-item.is-active,.commission-cascader-item.is-selected,.commission-cascader-item:hover{background:#e6f4ff}.commission-cascader-item-label{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.commission-cascader-item-arrow{flex:0 0 auto;color:rgba(0,0,0,.45);font-size:16px;line-height:1}.commission-cascader-search{display:block;flex:1 1 auto;width:100%;height:100%;padding:4px;overflow-y:auto;overscroll-behavior:contain}.commission-cascader-search .commission-cascader-item{min-height:34px}.commission-cascader-empty{padding:20px;color:var(--muted);font-size:13px;text-align:center}.commission-hint{margin-top:6px;font-size:12px;line-height:1.45;color:var(--muted)}.commission-hint strong{color:#0f766e}.cards-title,.table-title{display:flex;justify-content:space-between;align-items:center;gap:16px}.cards-title h2,.table-title h2{margin:0;font-size:18px}.cards-title span,.table-title span{color:var(--muted);font-size:13px}.price-hero{background:linear-gradient(135deg,rgba(37,99,235,.12),rgba(16,185,129,.08)),#f8fbff;border:1px solid rgba(37,99,235,.14);border-radius:24px;padding:22px;display:grid;gap:16px}.result-hint,.selected-channel{padding:11px 14px;border-radius:14px;background:rgba(37,99,235,.08);color:var(--brand);font-weight:700}.selected-channel{background:rgba(255,255,255,.7);border:1px solid rgba(37,99,235,.12);font-size:13px}.price-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}.price-block h3{margin:0 0 8px;font-size:15px;color:var(--muted);font-weight:700}.price-major{display:block;font-size:38px;line-height:1;font-weight:800;color:var(--brand);margin-bottom:10px}.price-major.secondary{color:rgba(37,99,235,.38);text-decoration:line-through;text-decoration-thickness:2px}.price-sub{display:block;color:var(--text);font-size:22px;font-weight:700}.price-sub small{color:var(--muted);font-size:13px;font-weight:600;margin-left:6px}.logistics-cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.logistics-card{text-align:left;padding:18px 16px;border-radius:22px;border:1px solid rgba(37,99,235,.18);background:linear-gradient(180deg,#fff,#f9fbff);display:grid;gap:7px;min-height:190px}.logistics-card.is-selected{border-color:rgba(16,185,129,.6);background:linear-gradient(180deg,rgba(236,253,245,.96),rgba(244,255,250,.98));box-shadow:0 16px 34px rgba(16,185,129,.12)}.logistics-card.is-disabled{opacity:.54;cursor:not-allowed;box-shadow:none}.mode-name{font-size:24px;line-height:1;font-weight:800;color:var(--brand)}.mode-transport{font-size:14px;color:var(--muted)}.logistics-card strong{font-size:34px;line-height:1;color:#f97316}.detail-card{overflow:hidden;border-radius:22px;border:1px solid rgba(133,154,186,.2);background:linear-gradient(180deg,rgba(255,255,255,.96),rgba(247,251,255,.98))}table{width:100%;border-collapse:collapse}td{padding:13px 16px;border-bottom:1px solid rgba(133,154,186,.15)}tr:last-child td{border-bottom:0}td:first-child{width:120px;color:var(--muted);font-weight:700}td:last-child{text-align:right;font-weight:700}.empty-state{text-align:center!important;color:var(--muted);padding:24px}.notes-card{padding:18px 20px 18px 24px}.notes-card ul{margin:0;padding-left:18px;display:grid;gap:10px;color:var(--muted)}@media (max-width:1120px){.grid.three,.grid.two,.layout,.logistics-cards,.price-grid{grid-template-columns:1fr}.hero{flex-direction:column;align-items:flex-start}}</style><div class="page"><div class="hero"><div><h1>Ozon 定价工具</h1><p>基于 GUOO realFBS 运费模板计算跨境运费，再叠加平台佣金、尾程派送费、广告费和目标毛利，给出建议售价与前台划线价。平台佣金支持 10%–21% 自选。</div><button id="reset-btn"class="ghost-btn"type="button">恢复示例参数</button></div><div class="layout"><div class="panel left-panel"><form id="pricing-form"><section class="section"><div class="section-header"><span class="section-dot"></span><div><h2>基本参数</h2><span>尺寸单位厘米，重量单位克</span></div></div><div class="grid two"><div class="field"><label for="commission-search">平台佣金类目</label> <input id="commission-rate"type="hidden"><div id="commission-cascader"class="commission-cascader"><div class="commission-cascader-control"><input id="commission-search"class="commission-cascader-input"placeholder="请选择类目(佣金)"autocomplete="off"> <button id="commission-clear"class="commission-cascader-clear"type="button"hidden>×</button></div><div id="commission-dropdown"class="commission-cascader-dropdown"hidden></div></div><div id="commission-hint"class="commission-hint">请选择完整的佣金类目和售价区间。</div></div><div class="field"><label for="procurement-cost">采购成本（¥）</label> <input id="procurement-cost"type="number"min="0"step="0.01"></div></div><div class="grid two"><div class="field"><label for="package-weight">包装重量（g）</label> <input id="package-weight"type="number"min="1"step="1"></div><div class="field"><label for="preferred-mode">跨境物流方式</label> <select id="preferred-mode"><option value="auto">自动匹配最优物流<option value="express">空运<option value="standard">陆空<option value="economy">陆运</select></div></div><div class="grid three"><div class="field"><label for="length-cm">长（cm）</label> <input id="length-cm"type="number"min="0"step="0.1"></div><div class="field"><label for="width-cm">宽（cm）</label> <input id="width-cm"type="number"min="0"step="0.1"></div><div class="field"><label for="height-cm">高（cm）</label> <input id="height-cm"type="number"min="0"step="0.1"></div></div></section><section class="section"><div class="section-header"><span class="section-dot"></span><div><h2>利润与前台策略</h2><span>默认按售价口径计算毛利</span></div></div><div class="grid two"><div class="field"><label for="target-margin">期望毛利率（%）</label> <input id="target-margin"type="number"min="0"max="95"step="0.1"></div><div class="field"><label for="front-discount">促销活动（%）</label> <input id="front-discount"type="number"min="0"max="95"step="0.1"></div></div><div class="field"><label for="domestic-fee">国内运费 + 代贴单（¥）</label> <input id="domestic-fee"type="number"min="0"step="0.01"></div></section><section class="section"><div class="section-header"><span class="section-dot"></span><div><h2>其他参数</h2><span>默认汇率来自你给的截图</span></div></div><div class="grid two"><div class="field"><label for="ad-rate">广告费比例（%）</label> <input id="ad-rate"type="number"min="0"max="95"step="0.1"></div><div class="field"><label for="other-rate">其他（提现 / 货损等，%）</label> <input id="other-rate"type="number"min="0"max="95"step="0.1"></div></div></section></form></div><div class="panel result-panel"><div class="price-hero"><div class="cards-title"><h2>计算结果</h2><span id="selected-channel"class="selected-channel">等待计算</span></div><div id="result-hint"class="result-hint"></div><div class="price-grid"><div class="price-block"><h3>售价</h3><span id="sale-price-cny"class="price-major">—</span> <span id="sale-price-rub"class="price-sub">— <small>RUB</small></span> <span id="sale-price-usd"class="price-sub">— <small>USD</small></span></div><div class="price-block"><h3>划线价</h3><span id="old-price-cny"class="price-major secondary">—</span> <span id="old-price-rub"class="price-sub">— <small>RUB</small></span> <span id="old-price-usd"class="price-sub">— <small>USD</small></span></div></div></div><div><div class="cards-title"><h2>物流费用</h2><span>基于 GUOO realFBS 渠道自动匹配</span></div><div id="logistics-cards"class="logistics-cards"></div></div><div class="detail-card"><div class="table-title"style="padding:16px 18px 0"><h2>计费明细</h2><span>价格与费用口径拆分</span></div><table><tbody id="detail-table"></table></div><div class="detail-card notes-card"><div class="table-title"style="margin-bottom:12px"><h2>说明</h2><span>当前版规则假设</span></div><ul id="note-box"></ul></div></div></div></div><script type="module"src="./pricing.mjs"></script>
